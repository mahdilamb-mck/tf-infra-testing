name: Terraform

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create backend config
        run: |
          cat <<EOF > ./terraform/backend.hcl
          bucket = "${{vars.GCP_TF_STATE_BUCKET}}"
          prefix = "terraform/state"
          EOF
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          mkdir -p $TF_PLUGIN_CACHE_DIR
          terraform init -input=false -backend-config=backend.hcl
        env:
          TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform-plugin-cache

      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        working-directory: ./terraform
        run: terraform plan -no-color -input=false -var 'project_id=${{vars.GCP_PROJECT_ID}}'

  apply:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create backend config
        run: |
          cat <<EOF > ./terraform/backend.hcl
          bucket = "${{vars.GCP_TF_STATE_BUCKET}}"
          prefix = "terraform/state"
          EOF
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          mkdir -p $TF_PLUGIN_CACHE_DIR
          terraform init -input=false -backend-config=backend.hcl
        env:
          TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform-plugin-cache

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve -input=false -var 'project_id=${{vars.GCP_PROJECT_ID}}'
